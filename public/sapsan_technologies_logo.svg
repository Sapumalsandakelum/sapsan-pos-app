<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Falcon Wing Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>

    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Dark Tech Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" />

  <!-- Background Tech Grid Lines (Subtle) -->
  <g opacity="0.05" stroke="#38bdf8" stroke-width="1">
    <path d="M 0,150 L 800,150 M 0,300 L 800,300 M 0,450 L 800,450" />
    <path d="M 200,0 L 200,600 M 400,0 L 400,600 M 600,0 L 600,600" />
    <circle cx="400" cy="220" r="180" fill="none" stroke-dasharray="4 8" />
  </g>

  <!-- LOGO EMBLEM: Geometric SapSan Falcon in Flight -->
  <g transform="translate(400, 210)" filter="url(#shadow)">
    
    <!-- Outer Cyan Speed Wing Left -->
    <path d="M -150,-70 L -40,-10 L -90,40 L -160,-20 Z" fill="url(#cyanGrad)" opacity="0.9" />

    <!-- Outer Cyan Speed Wing Right -->
    <path d="M 150,-70 L 40,-10 L 90,40 L 160,-20 Z" fill="url(#cyanGrad)" opacity="0.9" />

    <!-- Main Indigo Wings Left -->
    <path d="M -130,-40 L 0,-110 L -25,20 L -80,60 Z" fill="url(#indigoGrad)" />

    <!-- Main Indigo Wings Right -->
    <path d="M 130,-40 L 0,-110 L 25,20 L 80,60 Z" fill="url(#indigoGrad)" />

    <!-- Center Tech Core Falcon Head & Body -->
    <path d="M 0,-130 L 35,-60 L 0,80 L -35,-60 Z" fill="url(#silverGrad)" />

    <!-- Inner Falcon Beak Sharp Angle -->
    <path d="M 0,-130 L 20,-80 L 0,-50 L -20,-80 Z" fill="url(#cyanGrad)" filter="url(#glow)" />

    <!-- Lower Cyber Tail Fins -->
    <path d="M 0,80 L 45,130 L 0,110 L -45,130 Z" fill="url(#indigoGrad)" opacity="0.8" />

    <!-- Glowing Tech Circuit Core -->
    <circle cx="0" cy="-20" r="10" fill="#22d3ee" filter="url(#glow)" />
    <polygon points="0,-35 8,-15 -8,-15" fill="#ffffff" />
    
    <!-- Speed Accent Slits -->
    <path d="M -70,-10 L -30,0 L -50,20 Z" fill="#ffffff" opacity="0.6" />
    <path d="M 70,-10 L 30,0 L 50,20 Z" fill="#ffffff" opacity="0.6" />
  </g>

  <!-- TYPOGRAPHY: SAPSAN TECHNOLOGIES -->
  <g transform="translate(400, 420)" text-anchor="middle">
    <!-- Brand Title: SAPSAN -->
    <text y="0" font-family="'Inter', 'Montserrat', 'Segoe UI', sans-serif" font-weight="900" font-size="52" letter-spacing="12" fill="url(#silverGrad)" filter="url(#glow)">
      SAPSAN
    </text>

    <!-- Decorative Accent Bar -->
    <rect x="-140" y="16" width="280" height="4" rx="2" fill="url(#accentGlow)" />

    <!-- Subtitle: TECHNOLOGIES -->
    <text y="46" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="700" font-size="18" letter-spacing="14" fill="#38bdf8" opacity="0.95">
      TECHNOLOGIES
    </text>

    <!-- Tagline: PRECISION & SPEED -->
    <text y="75" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="11" letter-spacing="6" fill="#94a3b8" opacity="0.7">
      ADVANCED SOFTWARE &amp; POS SOLUTIONS
    </text>
  </g>
</svg>
